# =============================================================================
# Sidebar Navigation
# =============================================================================
# This file controls the sidebar navigation for your documentation.
#
# Basic syntax:
#   - page-name              # Links to docs/page-name.md
#   - page-name: { text: "Custom Title", icon: rocket-launch }
#
# Sections with nested pages:
#   - section-name:
#       text: "Section Title"
#       icon: folder
#       items:
#         - page-one
#         - page-two
#
# External links:
#   - link: "https://github.com/your-org"
#     text: "GitHub"
#     icon: github
#
# Available icons: https://phosphoricons.com (use kebab-case names)
# =============================================================================

- getting-started:
    text: Getting Started
    icon: rocket-launch

- basics:
    text: Basics
    icon: book
    group: true
    collapsed: false
    items:
        - repositories:
            text: Repositories
            icon: database

        - fields:
            text: Fields
            icon: table

        - actions:
            text: Actions
            icon: lightning


- customizations:
    text: Customizations
    icon: paint-brush

- translations:
    text: Translations
    icon: globe-hemisphere-east

- assets:
    text: Assets
    icon: image
